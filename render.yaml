grservices:
  # 1. PostgreSQL Database
  - name: alphapro-db
    type: pserv
    plan: standard
    postgres:
      version: 15
    disk:
      name: pgdata
      sizeGB: 10

  # 2. Redis Message Bus
  - name: alphapro-bus
    type: pserv
    plan: standard
    redis:
      version: 7

  # 3. The Oracle (AI Brain)
  - name: alphapro-brain
    type: worker
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python app.py
    envVars:
      - fromService:
          type: pserv
          name: alphapro-db
          property: connectionString
      - fromService:
          type: pserv
          name: alphapro-bus
          property: connectionString

  # 4. The API Gateway, Agent Coordinator & Frontend
  - name: alphapro-api
    type: web
    runtime: docker
    dockerfilePath: Dockerfile
    plan: standard
    healthCheckPath: /api/health
    envVars:
      # Trading Configuration - LIVE mode with MANUAL withdrawal
      - key: NODE_ENV
        value: production
      - key: TRADING_MODE
        value: LIVE
      - key: PORT
        value: 3000

      # Database & Cache
      - fromService:
          type: pserv
          name: alphapro-db
          property: connectionString
      - fromService:
          type: pserv
          name: alphapro-bus
          property: connectionString

      # Gasless Transaction Configuration (Pimlico)
      - key: PIMLICO_API_KEY
        value: pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: WALLET_ADDRESS
        value: 0x21e6d55cBd4721996a6B483079449cFc279A993a
      - key: BUNDLER_URL
        value: https://api.pimlico.io/v1/1/rpc?apikey=pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: PAYMASTER_URL
        value: https://api.pimlico.io/v2/1/rpc?apikey=pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: ENTRYPOINT_ADDRESS
        value: 0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789

      # RPC Endpoints
      - key: ETHEREUM_RPC
        value: https://api.pimlico.io/v1/1/rpc?apikey=pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: ARBITRUM_RPC
        value: https://api.pimlico.io/v1/42161/rpc?apikey=pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: OPTIMISM_RPC
        value: https://api.pimlico.io/v1/10/rpc?apikey=pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: POLYGON_RPC
        value: https://polygon-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: BASE_RPC
        value: https://api.pimlico.io/v1/8453/rpc?apikey=pim_UbfKR9ocMe5ibNUCGgB8fE

      # Alchemy WebSocket URLs for Real-time Mempool
      - key: ETH_WS_URL
        value: wss://eth-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: ALCHEMY_WS_URL
        value: wss://eth-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: ARBITRUM_WS_URL
        value: wss://arb-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: POLYGON_WS_URL
        value: wss://polygon-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: OPTIMISM_WS_URL
        value: wss://opt-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: BASE_WS_URL
        value: wss://base-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF

      # Alchemy API Keys - using multiple key names for compatibility
      - key: ALCHEMY_API_KEY
        value: mK2nj6ZSi1mZ2THJMUHcF
      - key: ALCHEMY-API-KEY
        value: mK2nj6ZSi1mZ2THJMUHcF
      - key: INFURA_API_KEY
        value: mK2nj6ZSi1mZ2THJMUHcF

      # Market Data APIs
      - key: DEXSCREENER_API_URL
        value: https://api.dexscreener.com/latest/dex
      - key: COINGECKO_API_URL
        value: https://api.coingecko.com/api/v3
      - key: BIRDEYE_API_URL
        value: https://public-api.birdeye.so

      # Brain Service
      - key: BRAIN_URL
        value: http://alphapro-brain:5000

      # Admin API Key
      - key: ADMIN_API_KEY
        value: alphapro-prod-key-2024

      # Security
      - key: JWT_SECRET
        value: alphapro_jwt_secret_prod_2024
