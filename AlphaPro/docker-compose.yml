services:
  # 1. AI Optimization Engine (Python)
  brain:
    build:
      context: ./alphapro-brain
      dockerfile: Dockerfile
    ports:
      - "5001:5000"
    environment:
      - PYTHONUNBUFFERED=1
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    networks:
      - alphapro-net

  # 2. API Gateway & Frontend (Node.js)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TRADING_MODE=LIVE
      - BRAIN_URL=http://brain:5000
    depends_on:
      - brain
    networks:
      - alphapro-net

networks:
  alphapro-net:
    driver: bridge
