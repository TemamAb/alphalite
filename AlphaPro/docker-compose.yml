version: '3.8'

services:
  # Node.js Profit Engine & API
  engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alphapro-engine
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - TRADING_MODE=LIVE
      - BRAIN_URL=http://brain:5000
      # Pass through critical secrets from local .env
      - ETH_RPC_URL=${ETH_RPC_URL}
      - PRIVATE_KEY=${PRIVATE_KEY}
      - WALLET_ADDRESS=${WALLET_ADDRESS}
      - PIMLICO_API_KEY=${PIMLICO_API_KEY}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - brain
    restart: unless-stopped
    networks:
      - alphapro-net

  # Python AI Oracle
  brain:
    build:
      context: ./modules/brain
      dockerfile: Dockerfile
    container_name: alphapro-brain
    ports:
      - "5000:5000"
    restart: unless-stopped
    networks:
      - alphapro-net

  # React Dashboard
  dashboard:
    build:
      context: ./modules/dashboard
      dockerfile: Dockerfile
    container_name: alphapro-dashboard
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - alphapro-net

networks:
  alphapro-net:
    driver: bridge