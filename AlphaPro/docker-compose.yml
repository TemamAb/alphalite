version: '3.8'

services:
  alphapro:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alphapro_engine
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      # Inject secrets here or via a .env file, NEVER hardcode in Dockerfile
      # - PRIVATE_KEY=${PRIVATE_KEY}
    volumes:
      # Mount config from host to container at runtime (Secure Pattern)
      - ./config:/usr/src/app/config
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3