# AlphaPro Production Deployment Configuration for Render.com
# IMPORTANT: Do NOT hardcode sensitive values!
# Use Render's Environment Variables and Secrets feature instead.

services:
  # The Brain (Python Sidecar) - AI Analysis
  - name: alphapro-brain
    runtime: python
    buildCommand: pip install -r alphapro-brain/requirements.txt
    startCommand: python alphapro-brain/app.py
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"

  # The Core (Node API + React Frontend)
  - name: alphapro-api
    runtime: docker
    dockerfilePath: Dockerfile
    rootDir: .
    plan: standard
    envVars:
      # ============================================
      # 🔴 CRITICAL: Set these in Render Secrets!
      # ============================================
      
      # Trading Configuration
      - key: NODE_ENV
        value: production
      - key: TRADING_MODE
        value: LIVE
      - key: PORT
        value: "3000"

      # ⚠️ REQUIRED FOR LIVE TRADING - Add your private key
      # - key: PRIVATE_KEY
      #   value: your_0x_private_key_here
      
      # Wallet Address (Smart Wallet for gasless transactions)
      - key: WALLET_ADDRESS
        value: "0x21e6d55cBd4721996a6B483079449cFc279A993a"

      # ============================================
      # 🔑 API KEYS - Use Render Secrets
      # ============================================
      
      # Gasless Transaction Configuration (Pimlico)
      - key: PIMLICO_API_KEY
        value: pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: BUNDLER_URL
        value: https://api.pimlico.io/v1/1/rpc?apikey=pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: PAYMASTER_URL
        value: https://api.pimlico.io/v2/1/rpc?apikey=pim_UbfKR9ocMe5ibNUCGgB8fE
      - key: ENTRYPOINT_ADDRESS
        value: 0x5FF137D4b0FDCD49DcA30c7CF57E578a026d2789

      # Blockchain RPC Endpoints (Primary)
      - key: ETH_RPC_URL
        value: https://eth-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: ARBITRUM_RPC_URL
        value: https://arb-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: OPTIMISM_RPC_URL
        value: https://opt-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: POLYGON_RPC_URL
        value: https://polygon-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: BASE_RPC_URL
        value: https://base.llamarpc.com

      # WebSocket URLs for Real-time Mempool (sub-200ms latency)
      - key: ETH_WS_URL
        value: wss://eth-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: ARBITRUM_WS_URL
        value: wss://arb-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: POLYGON_WS_URL
        value: wss://polygon-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: OPTIMISM_WS_URL
        value: wss://opt-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF
      - key: BASE_WS_URL
        value: wss://base-mainnet.g.alchemy.com/v2/mK2nj6ZSi1mZ2THJMUHcF

      # Alchemy API Key
      - key: ALCHEMY_API_KEY
        value: mK2nj6ZSi1mZ2THJMUHcF

      # Infura API Key (Backup)
      - key: INFURA_API_KEY
        value: mK2nj6ZSi1mZ2THJMUHcF

      # AI Service (Configured via Render Secrets or .env)

      # Brain Service
      - key: BRAIN_URL
        value: http://alphapro-brain:5000

      # Security
      - key: ADMIN_API_KEY
        value: alphapro-prod-key-2024
      - key: JWT_SECRET
        value: alphapro_jwt_secret_prod_2024

      # Market Data APIs (Free tier)
      - key: COINGECKO_API_URL
        value: https://api.coingecko.com/api/v3
      - key: DEXSCREENER_API_URL
        value: https://api.dexscreener.com/latest/dex
      - key: BIRDEYE_API_URL
        value: https://public-api.birdeye.so
