# api-deployment.yaml - Kubernetes deployment for AlphaPro API
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphapro-api
  namespace: alphapro
  labels:
    app: alphapro-api
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: alphapro-api
  template:
    metadata:
      labels:
        app: alphapro-api
        component: api
    spec:
      containers:
        - name: api
          image: alphapro/api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3001"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: alphapro-secrets
                  key: database-url
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: alphapro-api
  namespace: alphapro
spec:
  selector:
    app: alphapro-api
  ports:
    - port: 80
      targetPort: 3001
      name: http
  type: ClusterIP
