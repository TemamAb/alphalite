# brain-deployment.yaml - Kubernetes deployment for AlphaPro ML Brain
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alphapro-brain
  namespace: alphapro
  labels:
    app: alphapro-brain
    component: brain
spec:
  replicas: 2
  selector:
    matchLabels:
      app: alphapro-brain
  template:
    metadata:
      labels:
        app: alphapro-brain
        component: brain
    spec:
      containers:
        - name: brain
          image: alphapro/brain:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: FLASK_ENV
              value: "production"
            - name: MODEL_PATH
              value: "/app/models"
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "2Gi"
              cpu: "2000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: alphapro-brain
  namespace: alphapro
spec:
  selector:
    app: alphapro-brain
  ports:
    - port: 80
      targetPort: 5000
      name: http
  type: ClusterIP
