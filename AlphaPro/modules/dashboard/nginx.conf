server {
    listen 80;
    server_name localhost;

    # Define the root directory for the static files
    root /usr/share/nginx/html;
    index index.html;

    # This is the crucial part for Single Page Applications (SPAs).
    # It ensures that any request not matching a file or directory
    # is redirected to index.html, allowing client-side routing to work.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend API server.
    # This assumes the API service is named 'api' and is running on port 3000
    # within the same Docker network.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket connections to the backend API server for real-time updates.
    location /ws {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Enable Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}