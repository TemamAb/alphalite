# AlphaPro Multi-Instance Production Deployment
# Runs 10 parallel instances for fault tolerance and stability
# Each instance is independent - if one fails, others continue

services:
  # ============================================================
  # INSTANCE 1 (Primary)
  # ============================================================
  alphapro-api-1:
    build: .
    container_name: alphapro-api-1
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - TRADING_MODE=LIVE
      - INSTANCE_ID=alphapro-1
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - alphapro-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  alphapro-brain-1:
    build: ./alphapro-brain
    container_name: alphapro-brain-1
    ports:
      - "5001:5000"
    environment:
      - PORT=5000
      - BRAIN_PORT=5000
    restart: unless-stopped
    networks:
      - alphapro-net

  # ============================================================
